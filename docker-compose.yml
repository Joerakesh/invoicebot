# version: "3.9"

services:
  invoicebot:
    build: .
    container_name: invoicebot
    restart: always
    env_file:
      - .env

    volumes:
      - ./storage:/app/storage
      - ./logs:/app/logs
      - .:/app

    depends_on:
      - postgres

    command: uvicorn app.webhook:app --host 0.0.0.0 --port 8000 --reload

    ports:
      - "8000:8000"

  # gmail-worker:
  #   build: .
  #   container_name: invoicebot-gmail

  #   command: python -m app.gmail_worker

  #   volumes:
  #     - .:/app

  #   env_file:
  #     - .env

  #   depends_on:
  #     - postgres

  #   restart: always

  postgres:
    image: postgres:15
    container_name: invoicebot-postgres
    restart: always

    environment:
      POSTGRES_DB: invoicebot
      POSTGRES_USER: invoicebot
      POSTGRES_PASSWORD: secret

    ports:
      - "5432:5432"
