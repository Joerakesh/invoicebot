<!doctype html>
<html>
  <head>
    <title>InvoiceBot</title>

    <style>
      body {
        font-family: Arial;
        background: #0f172a;
        color: white;
        padding: 40px;
      }

      .card {
        background: #1e293b;
        padding: 20px;
        margin-bottom: 20px;
        border-radius: 12px;
      }

      button {
        padding: 12px 20px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        margin-right: 10px;
        font-size: 15px;
      }

      .green {
        background: #22c55e;
        color: white;
      }

      .blue {
        background: #3b82f6;
        color: white;
      }

      .logs {
        background: black;
        color: #22c55e;
        padding: 15px;
        height: 300px;
        overflow-y: auto;
        border-radius: 10px;
        font-family: monospace;
      }

      ul {
        padding-left: 20px;
      }

      li {
        margin-bottom: 8px;
      }
    </style>
  </head>

  <body>
    <h1>📧 InvoiceBot Email Dashboard</h1>

    <div class="card">
      <h2>Gmail Integration</h2>

      <p id="gmail-status">Checking...</p>

      <button class="green" onclick="loginGmail()">Connect Gmail</button>

      <button class="blue" onclick="fetchInvoices()">Fetch Invoices</button>
    </div>

    <div class="card">
      <h2>Downloaded Invoice PDFs</h2>

      <ul id="invoice-files">
        <li>No invoices fetched yet</li>
      </ul>
    </div>

    <div class="card">
      <h2>System Logs</h2>

      <div class="logs" id="logs"></div>
    </div>

    <script>
      function addLog(message) {
        let logs = document.getElementById("logs");

        let time = new Date().toLocaleTimeString();

        logs.innerHTML += `[${time}] ${message}<br>`;

        logs.scrollTop = logs.scrollHeight;
      }

      async function checkStatus() {
        let res = await fetch("/gmail/status");

        let data = await res.json();

        document.getElementById("gmail-status").innerHTML = data.connected
          ? "✅ Gmail Connected"
          : "❌ Gmail Not Connected";
      }

      async function loginGmail() {
        addLog("Opening Gmail OAuth login...");

        let res = await fetch("/gmail/login");

        let data = await res.json();

        window.location.href = data.auth_url;
      }

      async function fetchInvoices() {
        addLog("Fetching unread invoice emails...");

        let res = await fetch("/gmail/fetch", {
          method: "POST",
        });

        let data = await res.json();

        addLog(data.message);

        let files = data.files || [];

        let html = "";

        if (files.length === 0) {
          html = "<li>No invoice PDFs found</li>";
        } else {
          files.forEach((file) => {
            html += `<li>${file}</li>`;
          });
        }

        document.getElementById("invoice-files").innerHTML = html;
      }

      checkStatus();
    </script>
  </body>
</html>
